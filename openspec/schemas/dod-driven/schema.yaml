name: dod-driven
version: 2
description: DoD workflow
artifacts:
  - id: dod
    generates: dod.md
    description: Initial definition of done
    template: dod.md
    instruction: >
      Create a definition of done document with concrete, verifiable
      completion criteria for the change.

      Use `openspec/specs/dod-points/spec.md` as repo-specific guidance when it
      exists.

      Derive the DoD from the user's request and available change artifacts. If
      the user provides DoD content directly, use it as input.

      As you draft the DoD, identify gray areas. Record critical ones in
      `Must Resolve` and non-critical ones in `Deferred`.

      `Content` contains specific, verifiable completion criteria.
      `Must Resolve` contains critical gray areas that must be resolved before
      the DoD is finalized.
      `Deferred` contains unresolved items that are safe to postpone.
      Write items as observable outcomes, prefer short checklist entries, and
      include verification where relevant.
      Focus on completion criteria, not design rationale.

apply:
  requires:
    - dod
  tracks: dod.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    If `Must Resolve` is non-empty, pause for review. Resolve those items, then
    move each one to `Content` or `Deferred`.
